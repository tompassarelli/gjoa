<?xml version="1.0" encoding="UTF-8"?>
<!--
  gjoa wordmark — the product name as plain text, for the about-wordmark /
  firefox-wordmark slots (the new-tab page shows logo + wordmark side by side).
  Previously these slots got a copy of the logo, so the new-tab page rendered
  two sailboats. Plain system sans-serif so it renders consistently; brand blue
  so it's always visible. Copied verbatim by tools/icons/generate.bjs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 54" width="150" height="54">
  <text x="75" y="40" text-anchor="middle" font-size="44"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif"
        font-weight="700" letter-spacing="1.5" fill="#4a90d9">gjoa</text>
</svg>
