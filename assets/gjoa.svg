<?xml version="1.0" encoding="UTF-8"?>
<!--
  Gjoa logo — sailboat emoji (⛵, U+26F5) rendered via system color-emoji
  font. tools/icons/generate.ts runs rsvg-convert in the dev shell, which
  picks up Noto Color Emoji from fontconfig. Firefox renders the SVG
  directly in about: pages using its own emoji font fallback.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100"
  height="100"
  viewBox="0 0 100 100"
>
  <text
    x="50"
    y="85"
    font-size="90"
    text-anchor="middle"
    font-family="'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif"
  >⛵</text>
</svg>
