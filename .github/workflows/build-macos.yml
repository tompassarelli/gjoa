name: macOS build (Apple Silicon)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    # Needs the macOS 26 SDK: FF 151+ uses Liquid Glass (NSGlassEffectView) and
    # FF 152's webauthn uses the SDK 26.4 ASAuthorization `prf` API. Blacksmith's
    # macos-26 image ships Xcode 26.0-26.4 but DEFAULTS to 26.2, whose SDK lacks
    # `prf` (verified: 26.0-26.3 fail to compile it, 26.4 succeeds) — so the
    # "Select newest Xcode" step below is required on this runner.
    runs-on: blacksmith-6vcpu-macos-26
    timeout-minutes: 300
    env:
      FF_VERSION: "152.0"
    steps:
      - uses: actions/checkout@v4

      # Blacksmith's macos-26 defaults to Xcode 26.2, whose SDK lacks the
      # ASAuthorization `prf` API FF 152's dom/webauthn references (26.0-26.3
      # fail to compile it; 26.4 compiles). Select the newest installed Xcode.
      - name: Select newest Xcode (needs SDK 26.4+ for webauthn prf)
        run: |
          NEWEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "selecting $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download Firefox source
        run: |
          mkdir -p ~/.cache/gjoa/sources
          curl -L -o ~/.cache/gjoa/sources/firefox-${FF_VERSION}.source.tar.xz \
            "https://archive.mozilla.org/pub/firefox/releases/${FF_VERSION}/source/firefox-${FF_VERSION}.source.tar.xz"
          ls -lh ~/.cache/gjoa/sources/firefox-${FF_VERSION}.source.tar.xz

      # F9 hardening: verify the downloaded tarball against the IN-REPO pinned
      # SHA-256 (configs/firefox-${FF_VERSION}.sha256) BEFORE extracting. The
      # pin is committed + reviewed, so unlike a same-origin SHA256SUMS it can't
      # be swapped by an origin/TLS compromise. macOS ships `shasum`, not
      # `sha256sum`; compare the computed hash to the pinned value.
      - name: Verify tarball checksum (pinned)
        run: |
          PIN="configs/firefox-${FF_VERSION}.sha256"
          test -f "$PIN" || { echo "missing pinned checksum: $PIN"; exit 1; }
          expected=$(grep -v '^#' "$PIN" | awk 'NF{print $1; exit}')
          actual=$(shasum -a 256 ~/.cache/gjoa/sources/firefox-${FF_VERSION}.source.tar.xz | awk '{print $1}')
          echo "expected: $expected"
          echo "actual:   $actual"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Firefox tarball SHA-256 does not match pinned value in $PIN"
            exit 1
          fi
          echo "tarball checksum OK (matches pinned $PIN)"

      - name: Extract source
        run: |
          mkdir -p engine
          tar -xJf ~/.cache/gjoa/sources/firefox-${FF_VERSION}.source.tar.xz -C engine --strip-components=1

      - name: Patch macOS SDK version check
        run: |
          # FF 152 wants the macOS 26.4 SDK; the macos-26 runner ships a 26.x
          # Xcode SDK that may be slightly older (26.0–26.3). Lower the floor to
          # 26.0 — still new enough to provide NSGlassEffectView (the symbol the
          # old 15.0 floor removed, breaking the Jun-13 build), low enough that
          # the runner's SDK is accepted. Print the SDK actually present for the log.
          xcrun --sdk macosx --show-sdk-version || true
          sed -i '' 's/return "26.4"/return "26.0"/' \
            engine/build/moz.configure/toolchain.configure

      # gjoa's build tooling is written in beagle (a Racket compiler) and is
      # invoked as a sibling checkout at ../beagle. CI only checks out gjoa, so
      # without these two steps `bun run import` dies with
      # "../beagle/bin/beagle-build: No such file or directory" (exit 127).
      # beagle-build runs standalone with just Racket + the repo (verified: no
      # raco-pkg-install / direnv / PLTCOLLECTS setup needed).
      - name: Install Racket (beagle compiler runtime)
        uses: Bogdanp/setup-racket@v1.15
        with:
          version: 'stable'
      - name: Checkout beagle (sibling compiler)
        run: git clone --depth 1 https://github.com/tompassarelli/beagle.git ../beagle
      # beagle-build resolves modules from the 'beagle' Racket collection, which
      # beagle-lib provides (info.rkt: collection "beagle", deps just base).
      - name: Register beagle collection
        run: raco pkg install --link --batch --no-docs ../beagle/beagle-lib

      - name: Apply overlays and patches
        run: bun run import

      - name: Write mozconfig
        run: |
          cat > engine/mozconfig <<'MOZCONFIG'
          ac_add_options --with-branding=browser/branding/gjoa
          ac_add_options --with-distribution-id=org.gjoa
          ac_add_options --with-app-name=gjoa
          ac_add_options --with-app-basename=Gjoa
          ac_add_options --without-wasm-sandboxed-libraries
          ac_add_options --disable-updater
          ac_add_options --disable-tests
          ac_add_options --enable-optimize
          ac_add_options --enable-release
          # Debug symbols dominate link RAM, disk, and binary size; a distribution
          # build doesn't need them and macOS runners have limited disk.
          ac_add_options --disable-debug-symbols
          MOZCONFIG
          sed -i '' 's/^          //' engine/mozconfig
          cat engine/mozconfig

      - name: Bootstrap mach
        working-directory: engine
        run: |
          export MOZBUILD_STATE_PATH="$HOME/.mozbuild"
          echo 1 | ./mach bootstrap --application-choice=browser 2>&1 || true

      - name: Build
        working-directory: engine
        run: ./mach build

      - name: Package
        working-directory: engine
        run: ./mach package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gjoa-macos-arm64
          path: engine/obj-*/dist/*.dmg
          if-no-files-found: warn

      - name: Upload app bundle (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gjoa-macos-arm64-app
          path: engine/obj-*/dist/Gjoa.app
          if-no-files-found: warn
