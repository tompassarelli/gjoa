# Bun config.
#
# `bun test` walks the repo root by default. We can't let it walk
# engine/ — that's 5GB of mozilla-central source containing thousands
# of *.test.js files for Firefox internals none of which are ours.
#
# Previous version pinned discovery to `tests/`, which had the
# side-effect of burying our per-module test files at
# src/gjoa/chrome/src/{drawer,tabs}/*.test.ts. Replaced with explicit
# ignore patterns so discovery covers both tests/ and src/gjoa/.

[test]
pathIgnorePatterns = [
  "engine/**",
  "dist/**",
  "node_modules/**",
  ".direnv/**",
  ".devenv/**",
  "target/**",
  ".cache/**",
]
